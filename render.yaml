services:
  - type: web
    name: email-outreach
    env: node
    plan: free
    buildCommand: npm install --no-cache && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: NPM_FLAGS
        value: --legacy-peer-deps
      - key: NODE_OPTIONS
        value: --max-old-space-size=2048
